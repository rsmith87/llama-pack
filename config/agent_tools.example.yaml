enabled: true
max_iterations: 4
tool_timeout_seconds: 10.0
safe_roots:
  - ./logs
  - ${LLAMA_PACK_PROJECT_DIR}
  - ${LLAMA_PACK_MODELS_DIR}
tools:
  list_runtime_status:
    type: shell
    description: Print a short runtime status line.
    command:
      - printf
      - agent runtime ok
  read_agent_note:
    type: file_read
    description: Read a local note.
    path: ./logs/agent-note.txt
  read_project_file:
    type: file_read_dynamic
    description: Read a project or log file by relative path under the project directory.
    path: ${LLAMA_PACK_PROJECT_DIR}
    max_file_bytes: 524288
  local_health:
    type: http
    description: Check local health.
    method: GET
    url: ${LLAMA_PACK_AGENT_URL}/health
  list_project_files:
    type: directory_list
    description: List top-level and one-level-deep files in the project.
    path: ${LLAMA_PACK_PROJECT_DIR}
    recursive: true
    max_depth: 1
    max_entries: 300
    include_hidden: false
  search_project_code:
    type: text_search
    description: Search for text or symbols in project Python source files.
    path: ${LLAMA_PACK_PROJECT_DIR}
    glob: "**/*.py"
    regex: true
    max_matches: 50
    parameters:
      type: object
      properties:
        query:
          type: string
          description: The regex pattern to search for.
      required:
        - query
      additionalProperties: false
