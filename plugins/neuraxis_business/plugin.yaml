id: neuraxis_business
name: Neuraxis Business
version: "0.1.0"
requires_core: "1.0"
backend_api_version: "1.0"
frontend_api_version: "1.0"
entrypoint: neuraxis_business.plugin:plugin
description: Business plugin skeleton for controller-only Neuraxis features.
modes:
  - controller
config_schema:
  properties:
    organization_name:
      type: string
frontend:
  static_dir: neuraxis_business/static
  entry: /plugin-assets/neuraxis_business/business-entry.js
navigation:
  - label: Business
    path: /ui/plugins/neuraxis_business
ui_routes:
  - path: /ui/plugins/neuraxis_business
    label: Business
