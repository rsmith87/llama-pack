<section class="workflows-page" data-plugin-page="llama-pack-workflows">
  <header class="workflows-header">
    <h1>Workflows</h1>
    <button type="button" data-workflow-action="refresh">Refresh</button>
  </header>
  <form class="workflow-form" data-workflow-form="create">
    <h2 data-workflow-form-title>Create Workflow</h2>
    <input name="workflow_id" type="hidden" />
    <label>
      Name
      <input name="name" required maxlength="120" placeholder="Daily summary" />
    </label>
    <label>
      Description
      <input name="description" maxlength="500" placeholder="Reusable workflow for a recurring task" />
    </label>
    <label>
      Template
      <select name="template_id" data-workflow-template-select required></select>
    </label>
    <section class="workflow-parameter-panel" data-workflow-parameter-panel="thread_prompt_chain">
      <label>
        Content
        <textarea name="content" data-workflow-content rows="4" required></textarea>
      </label>
      <div class="workflow-steps-header">
        <strong>Steps</strong>
        <button type="button" data-workflow-action="add-step">Add Step</button>
      </div>
      <div class="workflow-step-list" data-workflow-steps></div>
      <button type="button" data-workflow-action="toggle-advanced">Advanced</button>
      <div class="workflow-advanced-fields" data-workflow-advanced hidden>
        <label>
          Model
          <input name="model" value="auto" />
        </label>
        <label>
          Target
          <input name="target" value="auto" />
        </label>
      </div>
    </section>
    <section class="workflow-parameter-panel" data-workflow-parameter-panel="scheduled_benchmark" hidden>
      <label>
        Benchmark ID
        <input name="benchmark_id" />
      </label>
      <label>
        Models
        <input name="models" placeholder="qwen, mistral" />
      </label>
    </section>
    <fieldset class="workflow-trigger-section">
      <legend>Trigger</legend>
      <label>
        Type
        <select name="trigger_type" data-workflow-trigger-type required>
          <option value="manual">Manual</option>
          <option value="schedule_daily">Daily</option>
          <option value="schedule_interval">Interval</option>
          <option value="event">Event</option>
        </select>
      </label>
      <label data-workflow-trigger-field="daily">
        Run time
        <input name="daily_time" type="time" value="09:00" />
      </label>
      <label data-workflow-trigger-field="interval">
        Every
        <input name="interval_minutes" type="number" min="1" step="1" value="60" />
      </label>
      <label data-workflow-trigger-field="event">
        Event
        <select name="event_type">
          <option value="llama_pack.chat.completed">Chat completed</option>
          <option value="llama_pack.chat.failed">Chat failed</option>
        </select>
      </label>
    </fieldset>
    <label class="workflow-checkbox">
      <input name="enabled" type="checkbox" checked />
      Enabled
    </label>
    <div class="workflow-form-actions">
      <button type="submit" data-workflow-save-label>Save</button>
      <button type="button" data-workflow-action="cancel-edit" hidden>Cancel</button>
      <span data-workflow-status></span>
    </div>
  </form>
  <section class="workflows-grid">
    <div>
      <h2>Templates</h2>
      <div id="workflow-templates" class="workflow-list"></div>
    </div>
    <div>
      <h2>Definitions</h2>
      <div id="workflow-definitions" class="workflow-list"></div>
    </div>
    <div>
      <h2>Recent Runs</h2>
      <div id="workflow-runs" class="workflow-list"></div>
    </div>
  </section>
</section>
