id: hello_plugin
name: Hello Plugin
version: "1.0"
requires_core: "1.0"
backend_api_version: "1.0"
frontend_api_version: "1.0"
entrypoint: hello_plugin.plugin:plugin
description: Minimal sample plugin for the Neuraxis plugin runtime.
modes:
  - controller
config_schema:
  properties:
    reject_chat:
      type: boolean
frontend:
  static_dir: hello_plugin/static
  pages:
    - route: /ui/plugins/hello_plugin
      template: templates/hello.html
      controller: controllers/hello.js
      title: Hello Plugin
