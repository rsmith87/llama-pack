<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llama Pack Desktop</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7f9;
        color: #16202a;
      }

      main {
        width: min(680px, calc(100vw - 48px));
        border: 1px solid #d5dde5;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 18px 45px rgba(18, 32, 44, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #45515d;
        line-height: 1.55;
      }

      code {
        display: block;
        overflow-x: auto;
        border: 1px solid #cbd5df;
        border-radius: 6px;
        background: #101820;
        color: #f5f7f9;
        padding: 14px 16px;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 14px;
      }

      .target {
        margin-top: 18px;
        font-size: 13px;
        color: #687684;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #101417;
          color: #eef3f7;
        }

        main {
          border-color: #34414c;
          background: #171d22;
          box-shadow: none;
        }

        p {
          color: #b5c0ca;
        }

        code {
          border-color: #45525e;
          background: #0b0f12;
        }

        .target {
          color: #92a0ad;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Development stack is not running</h1>
      <p>
        The Electron shell attaches to an existing Llama Pack web development stack. Start the
        backend and Vite frontend separately, then relaunch the desktop shell.
      </p>
      <code id="start-command">scripts/dev_fullstack.sh</code>
      <p class="target" id="target-url"></p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const startCommand = params.get("startCommand");
      const appUrl = params.get("appUrl");
      if (startCommand) {
        document.getElementById("start-command").textContent = startCommand;
      }
      if (appUrl) {
        document.getElementById("target-url").textContent = `Target URL: ${appUrl}`;
      }
    </script>
  </body>
</html>
