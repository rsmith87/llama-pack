[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite+pysqlite:///./logs/controller_state.db
version_locations = %(here)s/migrations/versions/controller:%(here)s/migrations/versions/auth:%(here)s/migrations/versions/audit:%(here)s/migrations/versions/chat_sessions:%(here)s/migrations/versions/downloads:%(here)s/migrations/versions/benchmarks

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
